<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>無人島サバイバル：VS クマ</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-container { width: 600px; padding: 20px; border: 2px solid #00ff00; background: #000; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        #log { height: 200px; overflow-y: auto; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; white-space: pre-wrap; }
        .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 10px; cursor: pointer; font-size: 14px; }
        button:hover { background: #00ff00; color: #000; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="log">【MISSION】目の前のクマを退けろ！アイテムを選択してください。</div>
    <div class="buttons">
        <button onclick="action('A')">[A] 半分に割れたスマホ</button>
        <button onclick="action('B')">[B] ピコピコハンマー</button>
        <button onclick="action('C')">[C] 大量のわさび</button>
        <button onclick="action('D')">[D] タキシード</button>
    </div>
</div>

<script>
    const log = document.getElementById('log');
    function print(text) {
        log.innerText = text;
    }

    function action(choice) {
        print("解析中...");
        setTimeout(() => {
            if (choice === 'A') {
                print("【結果：生存】\nスマホの画面反射でクマの目を潰した！その隙に森へ逃げ込んだ。");
            } else if (choice === 'B') {
                print("【結果：微妙】\nピコッ！という音にクマが驚いて立ち止まった。しかし、クマはさらに怒っているようだ...");
            } else if (choice === 'C') {
                print("【結果：勝利】\n鼻先にわさびを直撃させた！クマは悶絶しながら海へ飛び込んでいった！");
            } else if (choice === 'D') {
                print("【結果：？？】\nあまりの正装にクマが困惑している。どうやら執事として雇われたようだ。");
            }
        }, 800);
    }
</script>

</body>
</html>
