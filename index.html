<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SPACE SURVIVAL - FIXED</title>
    <style>
        body { background: #000; color: #0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: monospace; overflow: hidden; }
        canvas { border: 2px solid #0f0; background: #000; box-shadow: 0 0 20px #0f0; cursor: pointer; }
        .ui { margin-bottom: 10px; font-size: 1.2rem; text-shadow: 0 0 5px #0f0; }
    </style>
</head>
<body onclick="if(!alive)init()" onkeydown="if(!alive)init()">
    <div class="ui">SCORE: <span id="s">0</span> <span id="m" style="color:yellow; margin-left:20px;"></span></div>
    <canvas id="g" width="400" height="600"></canvas>
    <div style="margin-top:10px; color:#555;">[←][→]:移動 [SPACE]:攻撃 / 死んだらクリックでリセット</div>

<script>
const cvs = document.getElementById('g');
const ctx = cvs.getContext('2d');
const sEl = document.getElementById('s');
const mEl = document.getElementById('m');

let p, bs, es, ebs, items, stars, score, alive, power, tick, keys = {};

function init() {
    p = { x: 180, y: 520, w: 40, h: 20 };
    bs = []; es = []; ebs = []; items = [];
    score = 0; alive = true; power = 0; tick = 0;
    stars = Array.from({length: 50}, () => ({x: Math.random()*400, y: Math.random()*600, s: Math.random()*3+1}));
    sEl.innerText = score;
    mEl.innerText = "";
}

window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

function loop() {
    if (alive) {
        tick++;
        if (keys['ArrowLeft'] && p.x > 0) p.x -= 7;
        if (keys['ArrowRight'] && p.x < 360) p.x += 7;
        
        // プレイヤーの弾（yを減らすことで上に飛ばす）
        if (keys['Space'] && tick % 8 === 0) {
            bs.push({ x: p.x + 18, y: p.y, w: 4, h: 12 });
            if(power > 0) {
                bs.push({ x: p.x, y: p.y + 10, w: 4, h: 12 });
                bs.push({ x: p.x + 36, y: p.y + 10, w: 4, h: 12 });
            }
        }

        // 星の背景移動
        stars.forEach(s => { s.y += s.s; if(s.y > 600) s.y = 0; });

        // 生成（敵・アイテム）
        if (Math.random() < 0.006) items.push({ x: Math.random() * 380, y: -20, w: 20, h: 20 });
        if (tick % 45 === 0) {
            let isB = (score > 0 && score % 1000 === 0);
            es.push({ x: Math.random() * 320, y: -50, w: isB?60:30, h: isB?40:30, hp: isB?12:1, boss: isB });
        }

        // 弾の移動：プレイヤーの弾は上(-)、敵の弾は下(+)
        bs.forEach((b, i) => { b.y -= 12; if(b.y < -20) bs.splice(i, 1); });
        ebs.forEach((eb, i) => { eb.y += 6; if(eb.y > 600) ebs.splice(i, 1); });
        items.forEach((it, i) => { it.y += 3; if(it.y > 600) items.splice(i, 1); });
        es.forEach((e, i) => {
            e.y += e.boss ? 0.6 : 2.5;
            if (e.boss && tick % 50 === 0) ebs.push({ x: e.x + e.w/2, y: e.y + e.h, w: 8, h: 8 });
            if (e.y > 600 || (p.x < e.x + e.w && p.x + p.w > e.x && p.y < e.y + e.h && p.y + p.h > e.y)) alive = false;
        });

        // 当たり判定
        es.forEach((e, ei) => {
            bs.forEach((b, bi) => {
                if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                    e.hp--; bs.splice(bi, 1);
                    if(e.hp <= 0) { es.splice(ei, 1); score += 100; sEl.innerText = score; }
                }
            });
        });

        ebs.forEach((eb, i) => {
            if (eb.x < p.x + p.w && eb.x + eb.w > p.x && eb.y < p.y + p.h && eb.y + eb.h > p.y) alive = false;
        });

        items.forEach((it, i) => {
            if (it.x < p.x + p.w && it.x + it.w > p.x && it.y < p.y + p.h && it.y + it.h > p.y) {
                items.splice(i, 1); power = 400; mEl.innerText = "POWER UP!!";
            }
        });
        if(power > 0) { power--; if(power <= 0) mEl.innerText = ""; }
    }

    // 描画
    ctx.clearRect(0, 0, 400, 600);
    ctx.fillStyle = "#fff"; stars.forEach(s => ctx.fillRect(s.x, s.y, 1, 1)); // 星
    ctx.fillStyle = power > 0 ? '#ff0' : '#0f0'; ctx.fillRect(p.x, p.y, p.w, p.h); // 自機
    ctx.fillStyle = '#0ff'; bs.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h)); // 自機弾
    ctx.fillStyle = '#f00'; es.forEach(e => ctx.fillRect(e.x, e.y, e.w, e.h)); // 敵
    ctx.fillStyle = '#f80'; ebs.forEach(eb => { ctx.beginPath(); ctx.arc(eb.x, eb.y, 5, 0, Math.PI*2); ctx.fill(); }); // 敵弾
    ctx.fillStyle = '#ff0'; items.forEach(it => ctx.fillRect(it.x, it.y, it.w, it.h)); // アイテム

    if (!alive) {
        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,400,600);
        ctx.fillStyle = "#fff"; ctx.textAlign = "center";
        ctx.font = "30px Arial"; ctx.fillText("GAME OVER", 200, 280);
        ctx.font = "16px Arial"; ctx.fillText("Click to Restart", 200, 320);
    }
    requestAnimationFrame(loop);
}
init(); loop();
</script>
</body>
</html>
