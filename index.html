<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Brawl Mouse Aim Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: 'Arial', sans-serif; cursor: crosshair; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; pointer-events: none; }
        .bar-bg { width: 200px; height: 15px; background: #444; border: 2px solid #000; border-radius: 10px; margin-bottom: 5px; }
        #ult-bar { width: 0%; height: 100%; background: #ffcc00; transition: width 0.1s; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="ui">
        <div>ULTIMATE (Eキー)</div>
        <div class="bar-bg"><div id="ult-bar"></div></div>
        <div style="font-size: 14px;">[矢印/WASD]:移動 [マウス移動]:エイム [左クリック]:射撃</div>
    </div>
<script>
const config = {
    type: Phaser.AUTO,
    width: 1000,
    height: 800,
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: { preload: preload, create: create, update: update }
};

let player, obstacles, bullets, botBullets, bots;
let cursors, wasd, eKey;
let ultCharge = 0;
const game = new Phaser.Game(config);

function preload() {}

function create() {
    // 壁の生成
    obstacles = this.physics.add.staticGroup();
    for (let i = 0; i < 12; i++) {
        obstacles.add(this.add.rectangle(Phaser.Math.Between(100, 900), Phaser.Math.Between(100, 700), 60, 60, 0x777777));
    }

    // プレイヤー（初期位置中央）
    player = this.add.rectangle(500, 400, 40, 40, 0x00aaff);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);
    player.hp = 100;
    player.maxHp = 100;

    // ボットグループ
    bots = this.physics.add.group();
    for (let i = 0; i < 9; i++) {
        let bot = this.add.rectangle(Phaser.Math.Between(0, 1000), Phaser.Math.Between(0, 800), 40, 40, 0xff4444);
        this.physics.add.existing(bot);
        bot.body.setCollideWorldBounds(true);
        bot.hp = 50;
        bot.maxHp = 50;
        bots.add(bot);
        this.time.addEvent({
            delay: Phaser.Math.Between(2000, 4000),
            callback: () => botFire(this, bot),
            loop: true
        });
    }

    bullets = this.physics.add.group();
    botBullets = this.physics.add.group();

    // 入力設定（矢印キーとWASD両方対応）
    cursors = this.input.keyboard.createCursorKeys();
    wasd = this.input.keyboard.addKeys('W,A,S,D');
    eKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);

    // マウスクリックで射撃
    this.input.on('pointerdown', (pointer) => {
        if (pointer.leftButtonDown()) fireNormal(this, pointer);
    });

    // 当たり判定
    this.physics.add.collider(player, obstacles);
    this.physics.add.collider(bots, obstacles);
    this.physics.add.collider(bullets, obstacles, (b) => b.destroy());
    this.physics.add.collider(botBullets, obstacles, (b) => b.destroy());
    this.physics.add.overlap(bullets, bots, (bot, bullet) => {
        bullet.destroy();
        takeDamage(bot, 20);
        updateUlt(15);
    });
    this.physics.add.overlap(botBullets, player, (p, bullet) => {
        bullet.destroy();
        takeDamage(p, 10);
    });

    player.hpBar = this.add.graphics();
}

function update() {
    // 1. 移動処理
    player.body.setVelocity(0);
    let vx = 0; let vy = 0;
    if (cursors.left.isDown || wasd.A.isDown) vx = -250;
    else if (cursors.right.isDown || wasd.D.isDown) vx = 250;
    if (cursors.up.isDown || wasd.W.isDown) vy = -250;
    else if (cursors.down.isDown || wasd.S.isDown) vy = 250;
    player.body.setVelocity(vx, vy);

    // 2. マウスの方向を向く（エイム）
    let angle = Phaser.Math.Angle.Between(player.x, player.y, this.input.x, this.input.y);
    player.rotation = angle;

    // 3. ウルト発動
    if (Phaser.Input.Keyboard.JustDown(eKey) && ultCharge >= 100) {
        useWallBreakUlt(this);
    }

    // ボットの行動
    bots.children.iterate((bot) => {
        if (bot && bot.active) {
            this.physics.moveToObject(bot, player, 100);
            bot.rotation = Phaser.Math.Angle.Between(bot.x, bot.y, player.x, player.y);
            drawHPBar(this.add.graphics().clear(), bot, true);
        }
    });

    drawHPBar(player.hpBar, player, false);
}

function fireNormal(scene, pointer) {
    let b = scene.add.rectangle(player.x, player.y, 25, 8, 0x00ffff);
    scene.physics.add.existing(b);
    
    // プレイヤーの現在の向き（マウス方向）に発射
    b.rotation = player.rotation;
    scene.physics.velocityFromRotation(player.rotation, 700, b.body.velocity);
    
    bullets.add(b);
    scene.time.delayedCall(1000, () => b.destroy());
}

function botFire(scene, bot) {
    if (!bot.active) return;
    let b = scene.add.rectangle(bot.x, bot.y, 12, 12, 0xffaa00);
    scene.physics.add.existing(b);
    scene.physics.moveToObject(b, player, 300);
    botBullets.add(b);
    scene.time.delayedCall(2000, () => b.destroy());
}

function useWallBreakUlt(scene) {
    ultCharge = 0;
    updateUlt(0);
    let circle = scene.add.circle(player.x, player.y, 10, 0xff00ff, 0.6);
    scene.tweens.add({ targets: circle, radius: 250, alpha: 0, duration: 500, onComplete: () => circle.destroy() });

    obstacles.children.iterate((wall) => {
        if (wall && Phaser.Math.Distance.Between(player.x, player.y, wall.x, wall.y) < 250) wall.destroy();
    });
    bots.children.iterate((bot) => {
        if (bot && Phaser.Math.Distance.Between(player.x, player.y, bot.x, bot.y) < 250) {
            takeDamage(bot, 50);
            let angle = Phaser.Math.Angle.Between(player.x, player.y, bot.x, bot.y);
            bot.body.setVelocity(Math.cos(angle) * 1000, Math.sin(angle) * 1000);
        }
    });
}

function takeDamage(char, amt) {
    char.hp -= amt;
    if (char.hp <= 0) {
        if (char === player) { char.hp = char.maxHp; char.setPosition(500, 400); }
        else { char.destroy(); }
    }
}

function updateUlt(amt) {
    ultCharge = Math.min(100, ultCharge + amt);
    document.getElementById('ult-bar').style.width = ultCharge + '%';
}

function drawHPBar(graphics, char, isBot) {
    graphics.clear();
    if (!char.active) return;
    graphics.fillStyle(0x000000);
    graphics.fillRect(char.x - 20, char.y - 40, 40, 6);
    graphics.fillStyle(isBot ? 0xff0000 : 0x00ff00);
    graphics.fillRect(char.x - 20, char.y - 40, Math.max(0, (char.hp / char.maxHp) * 40), 6);
}
</script>
</body>
</html>
