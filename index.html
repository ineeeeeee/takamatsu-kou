<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SPACE SURVIVAL - FINAL FIXED</title>
    <style>
        body { background: #000; color: #0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: monospace; overflow: hidden; }
        canvas { border: 2px solid #0f0; background: #000; box-shadow: 0 0 20px #0f0; }
        .ui { margin-bottom: 10px; font-size: 1.2rem; }
    </style>
</head>
<body onclick="if(!alive)init()" onkeydown="if(!alive)init()">
    <div class="ui">SCORE: <span id="s">0</span> <span id="m" style="color:yellow; margin-left:20px;"></span></div>
    <canvas id="g" width="400" height="600"></canvas>
    <div style="margin-top:10px; color:#555;">[←][→]:移動 [SPACE]:攻撃 / 画面クリックでリセット</div>

<script>
const cvs = document.getElementById('g');
const ctx = cvs.getContext('2d');
const sEl = document.getElementById('s');
const mEl = document.getElementById('m');

let p, bs, es, ebs, items, stars, score, alive, power, tick, keys = {};

function init() {
    // 自機を画面下部に配置
    p = { x: 180, y: 530, w: 40, h: 20 };
    bs = []; // プレイヤーの弾
    es = []; // 敵
    ebs = []; // 敵の弾
    items = [];
    score = 0;
    alive = true;
    power = 0;
    tick = 0;
    stars = Array.from({length: 50}, () => ({x: Math.random()*400, y: Math.random()*600, s: Math.random()*2+1}));
    sEl.innerText = score;
    mEl.innerText = "";
}

window.onkeydown = e => { keys[e.code] = true; };
window.onkeyup = e => { keys[e.code] = false; };

function loop() {
    if (alive) {
        tick++;
        if (keys['ArrowLeft'] && p.x > 0) p.x -= 8;
        if (keys['ArrowRight'] && p.x < 360) p.x += 8;
        
        // 【最重要】プレイヤーの弾生成
        if (keys['Space'] && tick % 8 === 0) {
            // y座標を自機(p.y)からマイナス方向に飛ばす準備
            bs.push({ x: p.x + 18, y: p.y - 10, w: 4, h: 15 });
            if(power > 0) {
                bs.push({ x: p.x - 5, y: p.y, w: 4, h: 15 });
                bs.push({ x: p.x + 41, y: p.y, w: 4, h: 15 });
            }
        }

        // 背景
        stars.forEach(s => { s.y += s.s; if(s.y > 600) s.y = 0; });

        // 敵・アイテム生成
        if (Math.random() < 0.005) items.push({ x: Math.random() * 380, y: -20, w: 20, h: 20 });
        if (tick % 50 === 0) {
            let isB = (score > 0 && score % 1000 === 0);
            es.push({ x: Math.random() * 320, y: -50, w: isB?60:30, h: isB?40:30, hp: isB?10:1, boss: isB });
        }

        // --- 移動処理 ---
        // 1. プレイヤーの弾：上へ (yを減らす)
        for (let i = bs.length - 1; i >= 0; i--) {
            bs[i].y -= 15; 
            if (bs[i].y < -20) bs.splice(i, 1);
        }

        // 2. 敵の弾：下へ (yを増やす)
        for (let i = ebs.length - 1; i >= 0; i--) {
            ebs[i].y += 7;
            if (ebs[i].y > 600) ebs.splice(i, 1);
        }

        // 3. 敵とアイテム：下へ
        items.forEach((it, i) => { it.y += 3; if(it.y > 600) items.splice(i, 1); });
        es.forEach((e, i) => {
            e.y += e.boss ? 0.7 : 3;
            if (e.boss && tick % 60 === 0) ebs.push({ x: e.x + e.w/2, y: e.y + e.h, w: 8, h: 8 });
            if (e.y > 600) alive = false;
            // 接触死
            if (p.x < e.x + e.w && p.x + p.w > e.x && p.y < e.y + e.h && p.y + p.h > e.y) alive = false;
        });

        // 判定：プレイヤーの弾 -> 敵
        es.forEach((e, ei) => {
            bs.forEach((b, bi) => {
                if (b.x < e.x + e.w && b.x + b.w > e.x && b.y < e.y + e.h && b.y + b.h > e.y) {
                    e.hp--; 
                    bs.splice(bi, 1);
                    if(e.hp <= 0) { es.splice(ei, 1); score += 100; sEl.innerText = score; }
                }
            });
        });

        // 判定：敵の弾 -> プレイヤー
        ebs.forEach((eb) => {
            if (eb.x < p.x + p.w && eb.x + eb.w > p.x && eb.y < p.y + p.h && eb.y + eb.h > p.y) alive = false;
        });

        // 判定：アイテム取得
        items.forEach((it, i) => {
            if (it.x < p.x + p.w && it.x + it.w > p.x && it.y < p.y + p.h && it.y + it.h > p.y) {
                items.splice(i, 1); power = 400; mEl.innerText = "POWER UP!!";
            }
        });
        if(power > 0) { power--; if(power <= 0) mEl.innerText = ""; }
    }

    // --- 描画 ---
    ctx.clearRect(0, 0, 400, 600);
    ctx.fillStyle = "#444"; stars.forEach(s => ctx.fillRect(s.x, s.y, 1, 1));
    ctx.fillStyle = power > 0 ? '#ff0' : '#0f0'; ctx.fillRect(p.x, p.y, p.w, p.h); // 自機
    ctx.fillStyle = '#0ff'; bs.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h)); // 弾(水色)
    ctx.fillStyle = '#f00'; es.forEach(e => ctx.fillRect(e.x, e.y, e.w, e.h)); // 敵
    ctx.fillStyle = '#f80'; ebs.forEach(eb => { ctx.beginPath(); ctx.arc(eb.x, eb.y, 5, 0, 7); ctx.fill(); }); // 敵弾
    ctx.fillStyle = '#ff0'; items.forEach(it => ctx.fillRect(it.x, it.y, it.w, it.h)); // アイテム

    if (!alive) {
        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,400,600);
        ctx.fillStyle = "#fff"; ctx.textAlign = "center";
        ctx.font = "30px Arial"; ctx.fillText("GAME OVER", 200, 280);
        ctx.font = "16px Arial"; ctx.fillText("Click or Press Any Key to Restart", 200, 320);
    }
    requestAnimationFrame(loop);
}
init(); loop();
</script>
</body>
</html>
