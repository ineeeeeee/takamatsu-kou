<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Survival Game</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; text-align: center; }
        #out { height: 200px; padding: 20px; border: 1px solid #0f0; margin-bottom: 20px; white-space: pre-wrap; font-size: 1.2rem; }
        button { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px 20px; margin: 5px; cursor: pointer; }
        button:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>
    <div id="out">【警告】巨大なクマが接近中！手元のアイテムで対抗しろ。</div>
    <div id="btns">
        <button onclick="p('A')">割れたスマホ</button>
        <button onclick="p('B')">ピコハン</button>
        <button onclick="p('C')">大量のわさび</button>
        <button onclick="p('D')">タキシード</button>
    </div>
    <script>
        function p(c) {
            const o = document.getElementById('out');
            o.innerHTML = "判定中...";
            setTimeout(() => {
                const r = {
                    'A': "【生存】スマホの反射光で目潰し！クマは海へ転落した。",
                    'B': "【死亡】いい音が鳴っただけだった。クマに食われた。",
                    'C': "【勝利】鼻にわさびを直撃！クマは悶絶して逃走した。",
                    'D': "【伝説】圧倒的な礼装にクマが跪いた。新しい王の誕生だ。"
                };
                o.innerHTML = r[c] + "\n\n<button onclick='location.reload()'>リトライ</button>";
                document.getElementById('btns').style.display = 'none';
            }, 800);
        }
    </script>
</body>
</html>
