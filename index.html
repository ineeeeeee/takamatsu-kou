<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Brawl Stars Clone - Range Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; pointer-events: none; }
        .bar-bg { width: 200px; height: 20px; background: #444; border: 2px solid #000; border-radius: 10px; }
        #ult-bar { width: 0%; height: 100%; background: #ffcc00; transition: width 0.2s; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="ui">
        <div>必殺技ゲージ (Eキーで発動)</div>
        <div class="bar-bg"><div id="ult-bar"></div></div>
        <div style="margin-top:5px; font-size: 14px;">[矢印キー]:移動 [スペース]:移動方向に射撃</div>
    </div>
<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: { preload: preload, create: create, update: update }
};

let player, bot, obstacles, bullets, botBullets;
let cursors, spaceKey, eKey;
let ultCharge = 0;
const game = new Phaser.Game(config);

function preload() {}

function create() {
    // 1. 壁（障害物）
    obstacles = this.physics.add.staticGroup();
    obstacles.add(this.add.rectangle(400, 300, 100, 100, 0x555555)); // 中央の障害物
    obstacles.add(this.add.rectangle(150, 150, 60, 60, 0x555555));
    obstacles.add(this.add.rectangle(650, 450, 60, 60, 0x555555));

    // 2. プレイヤー設定
    player = this.add.rectangle(100, 300, 40, 40, 0x00aaff);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);
    player.hp = 100;
    player.maxHp = 100;
    player.lastDir = { x: 1, y: 0 }; // 初期向き（右）

    // 3. ボット設定
    bot = this.add.rectangle(700, 300, 40, 40, 0xff4444);
    this.physics.add.existing(bot);
    bot.body.setCollideWorldBounds(true);
    bot.hp = 100;
    bot.maxHp = 100;

    // 4. グループ
    bullets = this.physics.add.group();
    botBullets = this.physics.add.group();

    // 5. 入力設定
    cursors = this.input.keyboard.createCursorKeys();
    spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    eKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);

    // 6. 当たり判定
    this.physics.add.collider(player, obstacles);
    this.physics.add.collider(bot, obstacles);
    this.physics.add.collider(bullets, obstacles, (b) => b.destroy());
    this.physics.add.collider(botBullets, obstacles, (b) => b.destroy());

    // プレイヤーの通常弾がボットにヒット
    this.physics.add.overlap(bullets, bot, (target, bullet) => {
        bullet.destroy();
        takeDamage(target, 15);
        updateUlt(10); // ウルト充電
    });

    // ボットの弾がプレイヤーにヒット
    this.physics.add.overlap(botBullets, player, (target, bullet) => {
        bullet.destroy();
        takeDamage(target, 10);
    });

    // ボットの射撃タイマー
    this.time.addEvent({
        delay: 1500,
        callback: () => {
            let b = this.add.rectangle(bot.x, bot.y, 12, 12, 0xffaa00);
            this.physics.add.existing(b);
            this.physics.moveToObject(b, player, 250);
            botBullets.add(b);
            this.time.delayedCall(2000, () => b.destroy());
        },
        loop: true
    });

    // HPバー描画用
    player.hpBar = this.add.graphics();
    bot.hpBar = this.add.graphics();
}

function update() {
    // プレイヤー移動処理
    player.body.setVelocity(0);
    let vx = 0; let vy = 0;
    if (cursors.left.isDown) vx = -200;
    else if (cursors.right.isDown) vx = 200;
    if (cursors.up.isDown) vy = -200;
    else if (cursors.down.isDown) vy = 200;
    player.body.setVelocity(vx, vy);

    // 移動している方向に弾が飛ぶように向きを記録
    if (vx !== 0 || vy !== 0) {
        let mag = Math.sqrt(vx * vx + vy * vy);
        player.lastDir.x = vx / mag;
        player.lastDir.y = vy / mag;
    }

    // 通常攻撃（スペースキー）
    if (Phaser.Input.Keyboard.JustDown(spaceKey)) {
        fireNormal(this);
    }

    // ウルト発動（Eキー かつ ゲージ100）
    if (Phaser.Input.Keyboard.JustDown(eKey) && ultCharge >= 100) {
        fireUltimate(this);
    }

    // ボットAI：プレイヤーへ接近
    this.physics.moveToObject(bot, player, 100);

    // UI更新
    drawHPBar(player.hpBar, player);
    drawHPBar(bot.hpBar, bot);
}

function fireNormal(scene) {
    let b = scene.add.rectangle(player.x, player.y, 14, 14, 0x00ffff);
    scene.physics.add.existing(b);
    const speed = 500;
    b.body.setVelocity(player.lastDir.x * speed, player.lastDir.y * speed);
    bullets.add(b);
    scene.time.delayedCall(800, () => b.destroy());
}

function fireUltimate(scene) {
    ultCharge = 0;
    updateUlt(0);

    // 範囲攻撃のエフェクト（衝撃波）
    let wave = scene.add.circle(player.x, player.y, 10, 0xffff00, 0.5);
    scene.tweens.add({
        targets: wave,
        radius: 150, // 攻撃範囲
        alpha: 0,
        duration: 400,
        onComplete: () => wave.destroy()
    });

    // 範囲内に敵がいるか判定
    let dist = Phaser.Math.Distance.Between(player.x, player.y, bot.x, bot.y);
    if (dist < 150) {
        takeDamage(bot, 50); // ウルトは大ダメージ
        // ノックバック効果（敵を弾き飛ばす）
        let angle = Phaser.Math.Angle.Between(player.x, player.y, bot.x, bot.y);
        bot.body.setVelocity(Math.cos(angle) * 1000, Math.sin(angle) * 1000);
    }
}

function takeDamage(char, amt) {
    char.hp -= amt;
    if (char.hp <= 0) {
        char.hp = char.maxHp;
        char.setPosition(char === player ? 100 : 700, 300);
    }
}

function updateUlt(amt) {
    ultCharge = Math.min(100, ultCharge + amt);
    document.getElementById('ult-bar').style.width = ultCharge + '%';
}

function drawHPBar(graphics, char) {
    graphics.clear();
    graphics.fillStyle(0x000000);
    graphics.fillRect(char.x - 25, char.y - 45, 50, 8);
    graphics.fillStyle(char === player ? 0x00ff00 : 0xff0000);
    let w = (char.hp / char.maxHp) * 50;
    graphics.fillRect(char.x - 25, char.y - 45, Math.max(0, w), 8);
}
</script>
</body>
</html>
