<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNINTO SURVIVAL</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #screen { width: 90%; max-width: 600px; border: 2px solid #0f0; padding: 20px; background: #050505; box-shadow: 0 0 15px #0f0; }
        #text-area { height: 180px; margin-bottom: 20px; line-height: 1.6; font-size: 1.1em; border-bottom: 1px dotted #0f0; }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: transparent; border: 1px solid #0f0; color: #0f0; padding: 15px; cursor: pointer; font-size: 1em; transition: 0.2s; }
        button:hover { background: #0f0; color: #000; }
        button:disabled { border-color: #050; color: #050; cursor: not-allowed; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="screen">
    <div id="text-area"></div>
    <div class="btns" id="btn-container">
        <button onclick="choice('A')">[A] スマホ(壊)</button>
        <button onclick="choice('B')">[B] ピコハン</button>
        <button onclick="choice('C')">[C] わさび</button>
        <button onclick="choice('D')">[D] タキシード</button>
    </div>
</div>

<script>
    const msg = "【緊急事態】\n無人島。目の前に腹をすかせた巨大なクマがいる！\n手元にはガラクタしかない。\nどうする？ <span class='blink'>_</span>";
    const textArea = document.getElementById('text-area');
    const btnContainer = document.getElementById('btn-container');

    textArea.innerHTML = msg;

    function choice(type) {
        const btns = btnContainer.querySelectorAll('button');
        btns.forEach(b => b.disabled = true);
        
        textArea.innerHTML = "行動中...";
        
        setTimeout(() => {
            let res = "";
            switch(type) {
                case 'A': res = "【生存】\nスマホの画面反射で目潰し！\nクマが怯んだ隙に、ヤシの木の上へ逃げ延びた。"; break;
                case 'B': res = "【死亡】\nピコッ！と良い音が響いた。\nクマは「遊んでくれるのか？」と喜び、全力のベアハッグで圧死した。"; break;
                case 'C': res = "【完全勝利】\n鼻先にわさびを塗り込んだ！\nクマは悶絶し、時速80kmで海へ帰っていった。"; break;
                case 'D': res = "【伝説】\n着替えた。圧倒的フォーマル。\nクマは「失礼しました」と会釈し、サケを献上してきた。"; break;
            }
            textArea.innerHTML = res + "<br><br><button onclick='location.reload()'>リトライ</button>";
            btnContainer.style.display = 'none';
        }, 1000);
    }
</script>

</body>
</html>
